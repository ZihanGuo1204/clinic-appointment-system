{% extends "base.html" %}

{% block content %}
<div class="center-stack">
    <section class="form-panel">
        <div class="form-header">
            <h1 class="page-title center-text">Add Patient</h1>
            <p class="page-subtitle center-text">Register a new patient before scheduling an appointment.</p>
            <div class="center-actions">
                <a href="/" class="button secondary-button">Back to Home</a>
            </div>
        </div>

        {% if message %}
        <div class="{% if 'Error' in message %}error-banner{% else %}success-banner{% endif %}">
            {{ message }}
        </div>
        {% endif %}

        <form method="POST" class="modern-form">
            <div class="field">
                <label>Patient ID</label>
                <input type="number" name="patient_id" required>
            </div>

            <div class="field">
                <label>First Name</label>
                <input type="text" name="first_name" required>
            </div>

            <div class="field">
                <label>Last Name</label>
                <input type="text" name="last_name" required>
            </div>

            <div class="field">
                <label>Email</label>
                <input type="email" name="email" required>
            </div>

            <div class="form-submit">
                <button type="submit" class="button primary-button full-button">Add Patient</button>
            </div>
        </form>
    </section>
</div>
{% endblock %}
